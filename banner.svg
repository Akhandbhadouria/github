<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="400" fill="#161616"/>

  <!-- Subtle noise texture via tiny stars -->
  <!-- Stars scattered -->
  <circle cx="45" cy="28" r="1.2" fill="white" opacity="0.55"/>
  <circle cx="110" cy="62" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="175" cy="18" r="1.5" fill="white" opacity="0.65"/>
  <circle cx="240" cy="72" r="0.8" fill="white" opacity="0.35"/>
  <circle cx="390" cy="38" r="1.3" fill="white" opacity="0.5"/>
  <circle cx="470" cy="22" r="1" fill="white" opacity="0.45"/>
  <circle cx="540" cy="55" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="620" cy="14" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="710" cy="42" r="1" fill="white" opacity="0.4"/>
  <circle cx="800" cy="28" r="1.5" fill="white" opacity="0.55"/>
  <circle cx="860" cy="68" r="0.9" fill="white" opacity="0.45"/>
  <circle cx="950" cy="22" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="1030" cy="50" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="1100" cy="18" r="1.4" fill="white" opacity="0.55"/>
  <circle cx="1165" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="60" cy="340" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="150" cy="370" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="380" cy="385" r="1.3" fill="white" opacity="0.35"/>
  <circle cx="650" cy="375" r="1" fill="white" opacity="0.45"/>
  <circle cx="880" cy="360" r="1.4" fill="white" opacity="0.5"/>
  <circle cx="1070" cy="375" r="1.1" fill="white" opacity="0.4"/>
  <circle cx="1180" cy="350" r="0.9" fill="white" opacity="0.55"/>
  <circle cx="75" cy="195" r="0.8" fill="white" opacity="0.35"/>
  <circle cx="1140" cy="210" r="1.1" fill="white" opacity="0.4"/>
  <circle cx="420" cy="165" r="0.7" fill="white" opacity="0.3"/>
  <circle cx="780" cy="145" r="0.9" fill="white" opacity="0.35"/>

  <!-- ===================== LEFT DECORATIVE ARCS ===================== -->
  <!-- Outer sweeping arc (leftmost) -->
  <path d="M 55 0 C -30 100 -15 240 65 395"
        stroke="white" stroke-width="2" fill="none"
        stroke-dasharray="12 9" opacity="0.65" stroke-linecap="round"/>
  <!-- Mid arc -->
  <path d="M 130 0 C 40 90 30 210 120 395"
        stroke="white" stroke-width="2" fill="none"
        stroke-dasharray="10 8" opacity="0.5" stroke-linecap="round"/>
  <!-- Inner smaller arc -->
  <path d="M 210 0 C 140 75 130 185 200 370"
        stroke="white" stroke-width="1.5" fill="none"
        stroke-dasharray="8 7" opacity="0.38" stroke-linecap="round"/>

  <!-- ===================== PLANET ===================== -->
  <!-- Ring back half (drawn before planet) -->
  <path d="M 230 133 A 68 17 0 0 1 366 133"
        stroke="white" stroke-width="1.8" fill="none" opacity="0.55"/>
  <!-- Planet body -->
  <circle cx="298" cy="133" r="44" fill="#1e1e1e" stroke="white" stroke-width="1.8" opacity="0.9"/>
  <!-- Planet surface detail -->
  <ellipse cx="298" cy="127" rx="20" ry="6" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="290" cy="142" rx="12" ry="4" fill="none" stroke="white" stroke-width="0.7" opacity="0.2"/>
  <!-- Ring front half (drawn after planet) -->
  <path d="M 366 133 A 68 17 0 0 1 230 133"
        stroke="white" stroke-width="1.8" fill="none" opacity="0.9"/>

  <!-- ===================== LEFT SPARKLES ===================== -->
  <!-- Large 4-point sparkle near planet -->
  <g transform="translate(367, 78)" opacity="0.9">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="white"/>
  </g>
  <!-- Medium sparkle -->
  <g transform="translate(268, 62)" opacity="0.7">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="white"/>
  </g>
  <!-- Small dot sparkle -->
  <circle cx="240" cy="100" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="340" cy="58" r="1.8" fill="white" opacity="0.55"/>
  <circle cx="380" cy="95" r="1.5" fill="white" opacity="0.4"/>
  <g transform="translate(220, 175)" opacity="0.45">
    <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="white"/>
  </g>

  <!-- ===================== RIGHT DECORATIVE ARCS ===================== -->
  <!-- Outer sweeping arc (rightmost) -->
  <path d="M 1145 0 C 1230 100 1215 240 1135 395"
        stroke="white" stroke-width="2" fill="none"
        stroke-dasharray="12 9" opacity="0.65" stroke-linecap="round"/>
  <!-- Mid arc -->
  <path d="M 1070 0 C 1160 90 1170 210 1080 395"
        stroke="white" stroke-width="2" fill="none"
        stroke-dasharray="10 8" opacity="0.5" stroke-linecap="round"/>
  <!-- Inner smaller arc -->
  <path d="M 990 0 C 1060 75 1070 185 1000 370"
        stroke="white" stroke-width="1.5" fill="none"
        stroke-dasharray="8 7" opacity="0.38" stroke-linecap="round"/>

  <!-- ===================== RIGHT SPARKLES ===================== -->
  <g transform="translate(965, 78)" opacity="0.9">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="white"/>
  </g>
  <g transform="translate(1040, 60)" opacity="0.7">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="white"/>
  </g>
  <circle cx="960" cy="100" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="1075" cy="95" r="1.8" fill="white" opacity="0.45"/>
  <g transform="translate(985, 175)" opacity="0.45">
    <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="white"/>
  </g>
  <circle cx="1060" cy="120" r="1.5" fill="white" opacity="0.4"/>

  <!-- ===================== MAIN TEXT BLOCK ===================== -->
  <!-- Greeting -->
  <text x="440" y="138" fill="#aaaaaa" font-size="19" font-weight="400" letter-spacing="1.5">HELLO, MY NAME IS</text>

  <!-- Name -->
  <text x="438" y="192" fill="white" font-size="38" font-weight="700" letter-spacing="-0.5">Akhand Pratap Singh</text>

  <!-- Role tagline -->
  <text x="441" y="228" fill="#888888" font-size="17" font-weight="400" letter-spacing="0.3">Data Scientist &amp; ML Engineer · Let's Connect!</text>

  <!-- Divider line -->
  <line x1="440" y1="248" x2="860" y2="248" stroke="#333333" stroke-width="1"/>

  <!-- === SOCIAL ROW === -->
  <!-- GitHub -->
  <g transform="translate(440, 270)">
    <rect x="0" y="0" width="28" height="28" rx="14" fill="#2d2d2d"/>
    <!-- GitHub mark (simplified octocat) -->
    <circle cx="14" cy="11" r="6.5" fill="white"/>
    <path d="M 7.5 17 Q 5 23 14 24 Q 23 23 20.5 17" fill="white"/>
    <rect x="10" y="20" width="3" height="5" rx="1.5" fill="#2d2d2d"/>
    <rect x="15" y="20" width="3" height="5" rx="1.5" fill="#2d2d2d"/>
    <circle cx="11" cy="10" r="1.5" fill="#2d2d2d"/>
    <circle cx="17" cy="10" r="1.5" fill="#2d2d2d"/>
    <text x="38" y="19" fill="#cccccc" font-size="15">AkhandPratapSingh</text>
  </g>

  <!-- LinkedIn -->
  <g transform="translate(660, 270)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#0A66C2"/>
    <text x="14" y="20" fill="white" font-size="13" font-weight="800" text-anchor="middle" font-family="Arial">in</text>
    <text x="38" y="19" fill="#cccccc" font-size="15">akhandpratapsingh</text>
  </g>

  <!-- Twitter/X -->
  <g transform="translate(440, 315)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#2d2d2d"/>
    <!-- X logo -->
    <line x1="7" y1="7" x2="21" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="21" y1="7" x2="7" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <text x="38" y="19" fill="#cccccc" font-size="15">@akhandpratap</text>
  </g>

  <!-- Email -->
  <g transform="translate(660, 315)">
    <rect x="0" y="0" width="28" height="28" rx="5" fill="#2d2d2d"/>
    <!-- Envelope icon -->
    <rect x="4" y="8" width="20" height="13" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
    <polyline points="4,8 14,17 24,8" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="38" y="19" fill="#cccccc" font-size="15">your@email.com</text>
  </g>
</svg>
